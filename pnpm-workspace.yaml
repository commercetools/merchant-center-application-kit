# Single source of truth for external dep versions across the workspace.
# Workspace package.json files reference catalog entries via the catalog protocol:
#   "lodash": "catalog:"          -> default catalog (singletons / leaf utilities)
#   "react":  "catalog:react"     -> named catalog (deps that move together)
#   "react":  "catalog:peer"      -> peer catalog (consumer compatibility ranges)
#
# When does a dep earn a named catalog? ALL of:
#   (a) members release in lockstep OR are consumed together as a framework cohort,
#   (b) ≥2 consuming workspaces (not just the repo root),
#   (c) drift-from-catalog would cause real breakage (peer mismatch, runtime split).
# Single-consumer cohorts and topology clusters ("things that run server-side")
# stay in default — drift detection already prevents version drift, so a catalog
# adds *cohort signaling*, not safety.
#
# Named catalogs:
#   apollo     — Apollo Client + GraphQL runtime/tooling + apollo-link-* (peer-pinned to @apollo/client)
#   build      — compile/bundle/style toolchain (babel, postcss, ts, vite, webpack, emotion)
#   flopflip   — @flopflip/* feature-flag framework (releases in lockstep at one version)
#   formatjs   — @formatjs/* i18n ecosystem (cli, polyfills, parser — release together on majors)
#   lint       — code-quality enforcers (eslint, stylelint, prettier, ts-eslint)
#   peer       — consumer compatibility ranges for public packages
#   react      — react framework and react-bound libraries (router, redux, intl)
#   repo       — monorepo plumbing & cross-repo cohorts (@manypkg, @commercetools-uikit,
#                changesets, husky, commitlint, publint, attw)
#   test       — jest, testing library, msw, percy, puppeteer-based runners
#
# Entries inside each named catalog are grouped by sub-cohort (separator
# comments + blank lines) rather than alphabetized. Keep new entries in
# their group instead of dropping them at the bottom. The default catalog
# stays alphabetical (its members are singletons by definition).
#
# scripts/check-workspace-constraints.js enforces that every dep named in
# a catalog is consumed only via its catalog reference; literal versions
# in workspace package.json files are an error. It also flags uncataloged
# deps used at multiple specifiers across workspaces (drift) — the fix is
# to add the dep to a catalog. The parser tolerates blank lines and `#`
# comments anywhere inside a catalog block.

